name: OSIPTEL Automated Scraper

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    paths:
      - 'input.txt' # Triggers automatically when input.txt is updated and pushed

jobs:
  scrape_and_export:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: |
          npm install
          
      - name: Install System Dependencies for Puppeteer and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libx11-xcb1 libxcb-dri3-0 libdrm2 libgbm1 libxshmfence1 default-jre
          
      - name: Run Scraper Script
        run: |
          xvfb-run --auto-servernum node scraper.js
          
      - name: Commit and Push Generated Excel Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.xlsx || true
          git commit -m "chore: Auto-generar Excel de extracción masiva [skip ci]" || echo "No changes to commit"
          git push origin main
          
      - name: Upload Artifacts (Optional direct download)
        uses: actions/upload-artifact@v4
        with:
          name: Excel-Results
          path: '*.xlsx'
